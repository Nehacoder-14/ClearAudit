version: '3.8'

services:
  db:
    image: pgvector/pgvector:pg16
    container_name: clearaudit-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: clearaudit
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: clearaudit-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

volumes:
  pgdata:
